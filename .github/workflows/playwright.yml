name: Playwright Tests

on:
  # Trigger 1: automatically when code is merged/pushed to main
  push:
    branches: [main]
  # Trigger 2: daily at 3:00 AM Amman time.
  # GitHub cron runs in UTC; Amman is UTC+3, so 3:00 AM Amman = 00:00 UTC.
  schedule:
    - cron: '0 0 * * *'

jobs:
  test:
    name: Run Playwright Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chrome firefox

      - name: Run test suite (headless)
        id: tests
        run: npx playwright test

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v6
        if: always() # upload the report even when tests fail — that's when you need it most
        with:
          name: playwright-html-report
          path: reports/html-report/
          retention-days: 14

      - name: Send Slack notification
        if: always()   # runs whether tests passed or failed
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL secret not configured — skipping notification."
            exit 0
          fi

          if [ "$TESTS_OUTCOME" = "success" ]; then
            STATUS="✅ *PASSED*"
            COLOR="#2eb886"
          else
            STATUS="❌ *FAILED*"
            COLOR="#e01e5a"
          fi

          curl -sf -X POST -H 'Content-type: application/json' --data "{
            \"attachments\": [{
              \"color\": \"$COLOR\",
              \"blocks\": [
                { \"type\": \"section\", \"text\": { \"type\": \"mrkdwn\",
                  \"text\": \"*Playwright Test Suite:* $STATUS\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Triggered by:* ${{ github.event_name }}\n<$RUN_URL|View run & download HTML report>\" } }
              ]
            }]
          }" "$SLACK_WEBHOOK_URL"